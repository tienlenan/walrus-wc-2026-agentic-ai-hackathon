  <text x="540" y="220" text-anchor="middle" fill="#c8102e" font-size="30" font-family="JetBrains Mono, monospace" letter-spacing="4">WORLD CUP MEMORY EDITION</text>

  <circle cx="175" cy="330" r="86" fill="#1a1714"/>
  <ellipse cx="175" cy="348" rx="58" ry="48" fill="#f4ecd8"/>
  <circle cx="154" cy="326" r="10" fill="#1a1714"/>
  <circle cx="196" cy="326" r="10" fill="#1a1714"/>
