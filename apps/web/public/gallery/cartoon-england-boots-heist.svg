<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">England boots heist cartoon</title>
  <desc id="desc">Cartoon thief running off with a sack of England football boots from a team van.</desc>
  <rect width="1200" height="820" fill="#eef8ff"/>
  <path d="M54 62c250-38 830-34 1090 8 38 178 34 496-20 682-284 40-790 36-1070-8C18 524 18 238 54 62Z" fill="#fffdf3" stroke="#141414" stroke-width="7"/>
  <g transform="translate(112 86)">
    <rect width="700" height="126" rx="24" fill="#8ad0ff" stroke="#141414" stroke-width="6"/>
    <text x="28" y="50" fill="#141414" font-family="Comic Sans MS, Marker Felt, sans-serif" font-size="36" font-weight="900">ENGLAND'S BOOTS DID A RUNNER</text>
    <text x="28" y="92" fill="#141414" font-family="Comic Sans MS, Marker Felt, sans-serif" font-size="25">Kansas City van heist, before a single kick.</text>
  </g>
  <!-- team van -->
  <g transform="translate(120 470)">
    <rect x="0" y="40" width="300" height="150" rx="14" fill="#e85b45" stroke="#141414" stroke-width="7"/>
    <rect x="210" y="70" width="120" height="90" rx="10" fill="#cfe9ff" stroke="#141414" stroke-width="6"/>
    <text x="105" y="135" text-anchor="middle" fill="#fffdf3" font-family="Arial Black, Arial, sans-serif" font-size="40">ENG</text>
    <circle cx="80" cy="200" r="34" fill="#141414"/><circle cx="80" cy="200" r="13" fill="#fffdf3"/>
    <circle cx="270" cy="200" r="34" fill="#141414"/><circle cx="270" cy="200" r="13" fill="#fffdf3"/>
    <!-- open back door -->
    <path d="M0 40v150" stroke="#141414" stroke-width="10" stroke-linecap="round"/>
    <path d="M-46 36 0 40v150l-46 6Z" fill="#c64430" stroke="#141414" stroke-width="6"/>
  </g>
  <!-- running thief with sack -->
  <g transform="translate(640 360)">
    <!-- motion lines -->
    <path d="M-70 60h70M-90 120h84M-60 180h60" stroke="#141414" stroke-width="9" stroke-linecap="round"/>
    <!-- body -->
    <path d="M150 150h96l34 188H120l30-188Z" fill="#2c2c2c" stroke="#141414" stroke-width="7"/>
    <!-- stripes -->
    <path d="M150 200h150M146 250h160" stroke="#fffdf3" stroke-width="10"/>
    <!-- head + mask -->
    <circle cx="198" cy="108" r="50" fill="#f1bd7c" stroke="#141414" stroke-width="6"/>
    <rect x="150" y="92" width="96" height="30" rx="8" fill="#141414"/>
    <circle cx="180" cy="107" r="6" fill="#fffdf3"/><circle cx="216" cy="107" r="6" fill="#fffdf3"/>
    <!-- legs running -->
    <path d="M150 338 96 470M250 338l70 120" stroke="#141414" stroke-width="22" stroke-linecap="round"/>
    <path d="M92 476h80M320 462h78" stroke="#141414" stroke-width="18" stroke-linecap="round"/>
    <!-- sack of boots -->
    <path d="M300 150c70-26 150-26 196 26 28 70 18 150-40 196-86 26-176 10-196-66-16-86 10-140 40-182Z" fill="#caa76b" stroke="#141414" stroke-width="7"/>
    <path d="M330 150c40-30 96-30 132 0-44-12-90-11-132 0Z" fill="#141414"/>
    <text x="404" y="320" text-anchor="middle" fill="#141414" font-family="Comic Sans MS, Marker Felt, sans-serif" font-size="30" font-weight="900">BOOTS</text>
    <!-- escaping boot -->
    <path d="M520 250c40-6 86 6 96 34 6 22-14 34-44 32-30-2-58-14-62-34-3-18 6-30 10-32Z" fill="#e85b45" stroke="#141414" stroke-width="6"/>
    <path d="M520 282l-40 14M540 300l-30 30" stroke="#141414" stroke-width="7" stroke-linecap="round"/>
  </g>
  <!-- shocked crest -->
  <g transform="translate(118 250)">
    <rect width="150" height="160" rx="18" fill="#fffdf3" stroke="#141414" stroke-width="6"/>
    <text x="75" y="70" text-anchor="middle" font-size="58">🦁</text>
    <text x="75" y="120" text-anchor="middle" font-family="Comic Sans MS, Marker Felt, sans-serif" font-size="40" font-weight="900" fill="#e85b45">?!</text>
  </g>
  <g transform="translate(760 96)">
    <rect width="320" height="120" rx="22" fill="#141414" stroke="#141414" stroke-width="6"/>
    <text x="160" y="50" text-anchor="middle" fill="#fffdf3" font-family="Comic Sans MS, Marker Felt, sans-serif" font-size="27" font-weight="900">EVIDENCE LOG</text>
    <text x="160" y="90" text-anchor="middle" fill="#f8c54f" font-family="Comic Sans MS, Marker Felt, sans-serif" font-size="22">Walrus filed it before the warm-up.</text>
  </g>
</svg>
