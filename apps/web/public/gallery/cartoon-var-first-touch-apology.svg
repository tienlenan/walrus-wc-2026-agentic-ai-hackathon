<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">VAR first touch apology cartoon</title>
  <desc id="desc">Cartoon VAR screen reviewing a terrible first touch.</desc>
  <rect width="1200" height="820" fill="#fff7df"/>
  <path d="M54 62c250-38 830-34 1090 8 38 178 34 496-20 682-284 40-790 36-1070-8C18 524 18 238 54 62Z" fill="#fffdf3" stroke="#141414" stroke-width="7"/>
  <g transform="translate(100 82)">
    <rect width="610" height="126" rx="24" fill="#8ad0ff" stroke="#141414" stroke-width="6"/>
    <text x="28" y="50" fill="#141414" font-family="Comic Sans MS, Marker Felt, sans-serif" font-size="36" font-weight="900">VAR REVIEWS FIRST TOUCH</text>
    <text x="28" y="90" fill="#141414" font-family="Comic Sans MS, Marker Felt, sans-serif" font-size="25">Three camera angles. One apology letter.</text>
  </g>
  <g transform="translate(232 248)">
    <rect width="620" height="330" rx="30" fill="#141414" stroke="#141414" stroke-width="7"/>
    <rect x="38" y="38" width="544" height="230" rx="18" fill="#fffdf3" stroke="#8ad0ff" stroke-width="6"/>
    <circle cx="290" cy="168" r="42" fill="#fffdf3" stroke="#141414" stroke-width="6"/>
    <path d="M256 166h68M270 140l44 52M270 192l44-52" stroke="#141414" stroke-width="5"/>
    <path d="M330 170c82 10 142 44 180 100" fill="none" stroke="#e85b45" stroke-width="8" stroke-dasharray="14 12"/>
    <text x="310" y="308" text-anchor="middle" fill="#f8c54f" font-family="Arial Black, Arial, sans-serif" font-size="32">CHECK COMPLETE: TOUCH DENIED</text>
  </g>
  <g transform="translate(875 360)">
    <rect width="210" height="160" rx="20" fill="#f8c54f" stroke="#141414" stroke-width="6"/>
    <text x="105" y="62" text-anchor="middle" fill="#141414" font-family="Comic Sans MS, Marker Felt, sans-serif" font-size="28" font-weight="900">Sorry, ball.</text>
    <text x="105" y="106" text-anchor="middle" fill="#141414" font-family="Comic Sans MS, Marker Felt, sans-serif" font-size="22">That was not control.</text>
  </g>
