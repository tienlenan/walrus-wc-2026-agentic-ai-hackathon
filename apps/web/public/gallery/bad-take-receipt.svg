<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Bad take receipt</title>
  <desc id="desc">A mock receipt for a bad World Cup prediction.</desc>
  <rect width="1200" height="800" fill="#0a2540"/>
  <rect x="390" y="62" width="420" height="676" rx="4" fill="#fbf7ec" stroke="#1a1714" stroke-width="6"/>
  <path d="M418 112h364M418 178h364M418 560h364M418 625h364" stroke="#d8cdb4" stroke-width="4"/>
  <text x="600" y="145" text-anchor="middle" fill="#1a1714" font-family="Georgia,serif" font-size="42" font-weight="900">BAD TAKE RECEIPT</text>
  <text x="430" y="232" fill="#1a1714" font-family="Arial,sans-serif" font-size="30">Item</text>
  <text x="770" y="232" text-anchor="end" fill="#1a1714" font-family="Arial,sans-serif" font-size="30">Qty</text>
  <text x="430" y="290" fill="#1a1714" font-family="Arial,sans-serif" font-size="26">Brazil by 5</text>
  <text x="770" y="290" text-anchor="end" fill="#1a1714" font-family="Arial,sans-serif" font-size="26">1</text>
  <text x="430" y="340" fill="#1a1714" font-family="Arial,sans-serif" font-size="26">“Easy money”</text>
  <text x="770" y="340" text-anchor="end" fill="#1a1714" font-family="Arial,sans-serif" font-size="26">1</text>
  <text x="430" y="390" fill="#1a1714" font-family="Arial,sans-serif" font-size="26">Excuse after FT</text>
  <text x="770" y="390" text-anchor="end" fill="#1a1714" font-family="Arial,sans-serif" font-size="26">99</text>
  <g transform="translate(455 440) rotate(-8)">
    <rect x="0" y="0" width="290" height="78" fill="none" stroke="#c8102e" stroke-width="7"/>
    <text x="145" y="53" text-anchor="middle" fill="#c8102e" font-family="Impact,sans-serif" font-size="42">NON REFUNDABLE</text>
  </g>
  <text x="600" y="610" text-anchor="middle" fill="#1a1714" font-family="Arial,sans-serif" font-size="28">Lưu trên Walrus. Khó chối lắm.</text>
  <text x="600" y="670" text-anchor="middle" fill="#57514a" font-family="monospace" font-size="22">SUI OBJECT: pending humiliation</text>
</svg>
