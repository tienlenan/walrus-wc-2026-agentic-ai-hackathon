<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Oracle roast room</title>
  <desc id="desc">A troll card about oracle settlement and roasts.</desc>
  <rect width="1200" height="800" fill="#f4ecd8"/>
  <rect x="48" y="48" width="1104" height="704" fill="#fbf7ec" stroke="#1a1714" stroke-width="8"/>
  <text x="600" y="125" text-anchor="middle" fill="#1a1714" font-family="Impact,sans-serif" font-size="66">ORACLE ĐÃ GÕ BÚA</text>
  <g transform="translate(135 185)">
    <rect x="0" y="0" width="930" height="410" fill="#1a1714"/>
    <rect x="32" y="36" width="866" height="338" fill="#fbf7ec" stroke="#37c3b0" stroke-width="8"/>
    <text x="465" y="140" text-anchor="middle" fill="#c8102e" font-family="Impact,sans-serif" font-size="78">SETTLED.</text>
    <text x="465" y="220" text-anchor="middle" fill="#1a1714" font-family="Impact,sans-serif" font-size="62">ROAST MODE: ON</text>
    <text x="465" y="288" text-anchor="middle" fill="#1a1714" font-family="Arial,sans-serif" font-size="32">Sai tỉ số thì mất điểm.</text>
    <text x="465" y="332" text-anchor="middle" fill="#1a1714" font-family="Arial,sans-serif" font-size="32">Sai tự tin thì mất luôn sĩ diện.</text>
  </g>
  <path d="M344 650h512" stroke="#c8102e" stroke-width="10" stroke-linecap="round"/>
  <text x="600" y="705" text-anchor="middle" fill="#0a2540" font-family="Georgia,serif" font-size="36" font-weight="900">Gil không phán xét. Gil chỉ ghi biên bản.</text>
