<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/app-icon.svg" />
    <link rel="apple-touch-icon" href="/app-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Gil's VAR Shamebook — AI World Cup 2026 bad-take ledger with persistent memory on Walrus."
    />
    <title>Gil's VAR Shamebook — World Cup 2026</title>
    <!-- Self-hosted fonts (see src/styles/fonts.css); preload only the masthead-critical faces. -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/anton-regular.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/playfair-display-900.woff2" crossorigin />
    <style>
      .app-top-progress {
        position: fixed;
        inset: 0 auto auto 0;
        z-index: 9999;
        width: 100%;
        height: 3px;
        background: linear-gradient(90deg, #37c3b0, #f0b75b, #c8102e, #37c3b0);
        background-size: 220% 100%;
        animation: boot-progress 1.05s linear infinite;
        opacity: 0;
        transition: opacity 160ms ease;
      }
      html:not(.app-ready) .app-top-progress,
      html.app-route-loading .app-top-progress {
        opacity: 1;
      }
      @keyframes boot-progress {
        from {
          background-position: 0% 50%;
        }
        to {
          background-position: 220% 50%;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-top-progress {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-top-progress" aria-hidden="true"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
