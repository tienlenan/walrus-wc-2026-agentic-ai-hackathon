<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/app-icon.svg" />
    <link rel="apple-touch-icon" href="/app-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Gil's VAR Shamebook — AI World Cup 2026 bad-take ledger with persistent memory on Walrus."
    />
    <title>Gil's VAR Shamebook — World Cup 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: #fbf7ec;
        color: #1a1714;
        transition: opacity 220ms ease, visibility 220ms ease;
      }
      #boot-splash::before {
        content: "";
        position: fixed;
        inset: 0 auto auto 0;
        width: 100%;
        height: 4px;
        background: linear-gradient(90deg, #37c3b0, #f0b75b, #c8102e, #37c3b0);
        background-size: 220% 100%;
        animation: boot-progress 1.05s linear infinite;
      }
      .boot-card {
        width: min(26rem, calc(100vw - 2rem));
        border: 2px solid #1a1714;
        box-shadow: 3px 3px 0 #1a1714;
        background: #f4ecd8;
        padding: 1rem;
        font: 700 0.78rem ui-monospace, SFMono-Regular, Menlo, monospace;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .boot-logo {
        display: block;
        width: 72px;
        height: 72px;
        margin-bottom: 0.85rem;
        border: 2px solid #1a1714;
        border-radius: 18px;
        background: #fff7df;
        box-shadow: 2px 2px 0 #1a1714;
      }
      .boot-card strong {
        display: block;
        margin-top: 0.35rem;
        font: 900 clamp(1.6rem, 8vw, 2.7rem) Georgia, serif;
        line-height: 0.95;
        letter-spacing: 0;
        text-transform: none;
      }
      html.app-ready #boot-splash {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .app-top-progress {
        position: fixed;
        inset: 0 auto auto 0;
        z-index: 9998;
        width: 100%;
        height: 3px;
        background: linear-gradient(90deg, #37c3b0, #f0b75b, #c8102e, #37c3b0);
        background-size: 220% 100%;
        animation: boot-progress 1.05s linear infinite;
        opacity: 0;
        transition: opacity 160ms ease;
      }
      html:not(.app-ready) .app-top-progress,
      html.app-route-loading .app-top-progress {
        opacity: 1;
      }
      @keyframes boot-progress {
        from {
          background-position: 0% 50%;
        }
        to {
          background-position: 220% 50%;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot-splash::before,
        .app-top-progress {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" role="status" aria-live="polite">
      <div class="boot-card">
        <img class="boot-logo" src="/app-icon.svg" alt="" aria-hidden="true" />
        Loading the evidence desk
        <strong>Gil's VAR Shamebook</strong>
      </div>
    </div>
    <div class="app-top-progress" aria-hidden="true"></div>
    <div id="root"></div>
    <script>
      window.addEventListener("load", function () {
        window.setTimeout(function () {
          document.documentElement.classList.add("app-ready");
        }, 3500);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
